<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raven</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --bg-secondary: #161b22; --bg-hover: #1c2128;
            --border: #30363d; --border-hover: #484f58;
            --text: #c9d1d9; --text-secondary: #8b949e;
            --accent: #58a6ff; --accent-hover: #79c0ff;
            --success: #3fb950; --warning: #d29922; --error: #f85149;
            --code-bg: #1e2530;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        .header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--bg-secondary); }
        .header h1 { font-size: 15px; font-weight: 600; }
        .header .status { margin-left: auto; font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }
        .status-dot.error { background: var(--error); }
        .model-badge { font-size: 11px; padding: 2px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text-secondary); }

        /* Main */
        .main { flex: 1; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg-secondary); }
        .sidebar-header { padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
        .new-chat-btn { flex: 1; padding: 7px 12px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .new-chat-btn:hover { background: var(--accent-hover); }
        .refresh-btn { padding: 7px; background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text-secondary); cursor: pointer; font-size: 13px; }
        .refresh-btn:hover { border-color: var(--border-hover); color: var(--text); }
        .session-list { flex: 1; overflow-y: auto; padding: 0 8px; }
        .session-item { padding: 10px 10px; margin-bottom: 2px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; position: relative; }
        .session-item:hover { background: var(--bg-hover); }
        .session-item.active { background: rgba(88, 166, 255, 0.1); }
        .session-item .title { font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-item .meta { font-size: 11px; color: var(--text-secondary); }
        .session-item .delete-btn { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); padding: 2px 6px; background: none; border: none; color: var(--text-secondary); cursor: pointer; opacity: 0; transition: opacity 0.15s; font-size: 12px; }
        .session-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: var(--error); }
        .sidebar-footer { padding: 10px 14px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-secondary); text-align: center; }

        /* Chat */
        .chat { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 16px 20px; }
        .message { max-width: 800px; margin: 0 auto 12px; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.6; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { background: var(--code-bg); margin-left: auto; max-width: 600px; }
        .message.assistant { background: transparent; border: 1px solid var(--border); }
        .message .role { font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; font-weight: 600; }
        .message .content { white-space: pre-wrap; word-break: break-word; }
        .message .content code { background: var(--code-bg); padding: 2px 5px; border-radius: 3px; font-family: 'Courier New', monospace; font-size: 12px; }
        .message .content pre { background: var(--code-bg); padding: 10px; border-radius: 6px; overflow-x: auto; margin: 6px 0; }
        .message .content pre code { padding: 0; background: none; }
        .tool-call-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: rgba(217, 164, 30, 0.1); border: 1px solid rgba(217, 164, 30, 0.25); border-radius: 4px; font-size: 11px; color: #d9a41e; margin-bottom: 6px; }
        .tool-result details { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
        .tool-result summary { cursor: pointer; }
        .tool-result pre { margin-top: 4px; padding: 6px; background: var(--code-bg); border-radius: 4px; overflow-x: auto; max-height: 120px; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state h2 { font-size: 16px; margin-bottom: 8px; color: var(--text); }

        /* Input */
        .input-area { padding: 12px 16px; border-top: 1px solid var(--border); }
        .input-box { max-width: 800px; margin: 0 auto; position: relative; }
        .input-box textarea { width: 100%; min-height: 48px; max-height: 160px; padding: 10px 42px 10px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; resize: vertical; outline: none; }
        .input-box textarea:focus { border-color: var(--accent); }
        .input-box textarea::placeholder { color: var(--text-secondary); }
        .send-btn { position: absolute; right: 8px; bottom: 8px; width: 32px; height: 32px; background: var(--accent); border: none; border-radius: 6px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:disabled { background: var(--border); cursor: not-allowed; }

        /* Stats */
        .stats-bar { padding: 6px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-secondary); display: flex; gap: 14px; }

        /* Loading */
        .loading { display: flex; gap: 3px; padding: 8px 0; }
        .loading span { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
        .loading span:nth-child(2) { animation-delay: -0.2s; }
        .loading span:nth-child(3) { animation-delay: -0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.3); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

        /* Responsive */
        @media (max-width: 768px) { .sidebar { position: fixed; left: -280px; top: 0; bottom: 0; z-index: 100; transition: left 0.2s; } .sidebar.open { left: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Raven</h1>
        <span class="model-badge" id="modelBadge">加载中...</span>
        <div class="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">连接中...</span>
        </div>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createNewSession()">+ 新会话</button>
                <button class="refresh-btn" onclick="loadSessions()" title="刷新">&#x21bb;</button>
            </div>
            <div class="session-list" id="sessionList"></div>
            <div class="sidebar-footer">
                <span id="sessionCount">0 个会话</span>
            </div>
        </div>

        <div class="chat">
            <div class="messages" id="messages">
                <div class="empty-state">
                    <h2>Raven</h2>
                    <p>选择一个会话或创建新对话</p>
                </div>
            </div>
            <div class="input-area">
                <div class="input-box">
                    <textarea id="input" placeholder="输入消息... (Shift+Enter 换行, Enter 发送)" onkeydown="handleKeyDown(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9"></polygon></svg>
                    </button>
                </div>
            </div>
            <div class="stats-bar" id="statsBar">
                <span id="tokenStats">Tokens: 0</span>
                <span id="msgStats">消息: 0</span>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const API_BASE = '';
        let isStreaming = false;
        let currentSessionId = null;
        let sessions = [];

        // ==================== 初始化 ====================
        async function init() {
            await checkHealth();
            await loadModels();
            await loadSessions();
            document.getElementById('input').focus();
        }

        // ==================== 健康检查 ====================
        async function checkHealth() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                if (res.ok) {
                    document.getElementById('statusDot').className = 'status-dot';
                    document.getElementById('statusText').textContent = '已连接';
                } else throw new Error(' unhealthy');
            } catch (e) {
                document.getElementById('statusDot').className = 'status-dot error';
                document.getElementById('statusText').textContent = '未连接';
            }
        }

        // ==================== 加载模型 ====================
        async function loadModels() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/models`);
                const data = await res.json();
                if (data.models && data.models.length > 0) {
                    document.getElementById('modelBadge').textContent = data.models[0].name;
                } else {
                    document.getElementById('modelBadge').textContent = '默认模型';
                }
            } catch (e) { document.getElementById('modelBadge').textContent = '未知'; }
        }

        // ==================== 会话管理 ====================
        async function loadSessions() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/sessions`);
                const data = await res.json();
                sessions = data.sessions || [];
                renderSessionList();
                document.getElementById('sessionCount').textContent = `${sessions.length} 个会话`;
            } catch (e) { console.log('加载会话失败:', e); }
        }

        function renderSessionList() {
            const list = document.getElementById('sessionList');
            if (sessions.length === 0) {
                list.innerHTML = '<div style="padding:20px;color:var(--text-secondary);font-size:12px;text-align:center;">暂无历史会话</div>';
                return;
            }
            list.innerHTML = sessions.map((s, idx) => {
                const isActive = s.id === currentSessionId;
                const date = s.updated_at ? new Date(s.updated_at).toLocaleDateString() : '';
                return `<div class="session-item ${isActive ? 'active' : ''}" onclick="switchSession('${s.id}')">
                    <div class="title">${escapeHtml(s.title || '未命名')}</div>
                    <div class="meta">${date} · ${s.message_count || 0} 条</div>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteSession('${s.id}')">&#x2715;</button>
                </div>`;
            }).join('');
        }

        async function createNewSession() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/sessions`, { method: 'POST' });
                const data = await res.json();
                if (data.session_id) {
                    currentSessionId = data.session_id;
                    await loadSessions();
                    clearMessages();
                    document.getElementById('input').focus();
                }
            } catch (e) { console.error('创建会话失败:', e); }
        }

        async function switchSession(sessionId) {
            try {
                const res = await fetch(`${API_BASE}/api/v1/sessions/${sessionId}`);
                const data = await res.json();
                if (data.status === 'ok') {
                    currentSessionId = sessionId;
                    renderSessionList();
                    clearMessages();
                    // 加载历史消息（如果有的话，需要额外的API）
                }
            } catch (e) { console.error('切换会话失败:', e); }
        }

        async function deleteSession(sessionId) {
            if (!confirm('确定要删除这个会话吗？')) return;
            try {
                await fetch(`${API_BASE}/api/v1/sessions/${sessionId}`, { method: 'DELETE' });
                if (currentSessionId === sessionId) { currentSessionId = null; clearMessages(); }
                await loadSessions();
            } catch (e) { console.error('删除失败:', e); }
        }

        function clearMessages() {
            document.getElementById('messages').innerHTML = `
                <div class="empty-state"><h2>新对话</h2><p>开始发送消息...</p></div>`;
            document.getElementById('tokenStats').textContent = 'Tokens: 0';
            document.getElementById('msgStats').textContent = '消息: 0';
        }

        // ==================== 消息发送 ====================
        async function sendMessage() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message || isStreaming) return;

            // 如果没有当前会话，先创建一个
            if (!currentSessionId) {
                await createNewSession();
                if (!currentSessionId) return;
            }

            input.value = '';
            isStreaming = true;
            document.getElementById('sendBtn').disabled = true;

            // 移除 empty state
            const msgsDiv = document.getElementById('messages');
            if (msgsDiv.querySelector('.empty-state')) msgsDiv.innerHTML = '';

            // 添加用户消息
            addMessage('user', escapeHtml(message));
            updateStats();

            // 添加助手占位
            const assistantDiv = addMessage('assistant', '<div class="loading"><span></span><span></span><span></span></div>');

            try {
                const response = await fetch(`${API_BASE}/api/v1/chat/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantText = '';
                let toolCalls = [];

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);
                        if (data === '[DONE]' || !data) continue;

                        try {
                            const event = JSON.parse(data);
                            switch (event.type) {
                                case 'text':
                                    assistantText += event.content || '';
                                    assistantDiv.querySelector('.content').innerHTML = formatContent(assistantText);
                                    assistantDiv.querySelector('.content').scrollIntoView({ behavior: 'smooth', block: 'end' });
                                    break;
                                case 'tool_call':
                                    toolCalls.push(event.content);
                                    appendToolCall(assistantDiv, event.content);
                                    break;
                                case 'tool_result':
                                    appendToolResult(assistantDiv, event.content);
                                    break;
                                case 'usage':
                                    if (event.usage) {
                                        document.getElementById('tokenStats').textContent = `Tokens: ${event.usage.total_tokens || 0}`;
                                    }
                                    break;
                                case 'error':
                                    assistantDiv.querySelector('.content').textContent = `错误: ${event.content || '未知错误'}`;
                                    break;
                                case 'done': break;
                            }
                        } catch (e) {}
                    }
                }

                if (!assistantText && toolCalls.length === 0) {
                    assistantDiv.querySelector('.content').textContent = '(无响应)';
                }
                updateStats();
                await loadSessions(); // 刷新会话列表

            } catch (e) {
                assistantDiv.querySelector('.content').textContent = `连接错误: ${e.message}\n请确保后端服务器已启动 (raven serve)`;
            }

            isStreaming = false;
            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }

        function addMessage(role, content) {
            const msgsDiv = document.getElementById('messages');
            // 移除 loading
            if (role === 'user' && msgsDiv.querySelector('.loading')) {
                msgsDiv.querySelector('.message:last-child').remove();
            }
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const label = role === 'user' ? '你' : 'Agent';
            div.innerHTML = `<div class="role">${label}</div><div class="content">${content}</div>`;
            msgsDiv.appendChild(div);
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
            return div;
        }

        function formatContent(text) {
            return escapeHtml(text)
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function appendToolCall(div, content) {
            const contentDiv = div.querySelector('.content');
            // 移除 loading
            const loading = contentDiv.querySelector('.loading');
            if (loading) loading.remove();
            let toolName = 'tool';
            try {
                const tc = JSON.parse(content);
                toolName = tc.name || (tc.function && tc.function.name) || 'tool';
            } catch (e) {}
            const badge = document.createElement('div');
            badge.className = 'tool-call-badge';
            badge.textContent = '\u{1F527} ' + toolName;
            contentDiv.appendChild(badge);
        }

        function appendToolResult(div, content) {
            const contentDiv = div.querySelector('.content');
            const details = document.createElement('div');
            details.className = 'tool-result';
            const preview = content.length > 300 ? content.slice(0, 300) + '...' : content;
            details.innerHTML = `<details><summary>工具结果</summary><pre>${escapeHtml(preview)}</pre></details>`;
            contentDiv.appendChild(details);
        }

        function updateStats() {
            const count = document.querySelectorAll('.message').length;
            document.getElementById('msgStats').textContent = `消息: ${count}`;
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
