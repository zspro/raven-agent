<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raven</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --error: #f85149;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 10px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            -webkit-app-region: drag;
        }
        .header h1 { font-size: 14px; font-weight: 600; }
        .header .controls { margin-left: auto; display: flex; gap: 8px; -webkit-app-region: no-drag; }
        .btn-icon {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-icon:hover { color: var(--text); border-color: var(--text-secondary); }
        .main { flex: 1; display: flex; overflow: hidden; }
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }
        .btn {
            width: 100%;
            padding: 8px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }
        .btn:hover { opacity: 0.9; }
        .session-list { flex: 1; overflow-y: auto; padding: 8px; }
        .session-item {
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 2px;
        }
        .session-item:hover { background: rgba(255,255,255,0.05); }
        .session-item.active { background: rgba(88,166,255,0.1); }
        .chat { flex: 1; display: flex; flex-direction: column; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
        }
        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: #fff;
        }
        .message.assistant {
            align-self: flex-start;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
        }
        .message pre {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 6px 0;
        }
        .message code {
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }
        .input-box {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 120px;
        }
        .input-box:focus { border-color: var(--accent); }
        .send-btn {
            padding: 10px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .status-bar {
            padding: 6px 16px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .loading { display: flex; align-items: center; gap: 8px; }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Raven</h1>
        <div class="controls">
            <button class="btn-icon" onclick="clearChat()">New</button>
            <button class="btn-icon" onclick="checkHealth()">Check</button>
        </div>
    </div>
    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="btn" onclick="newSession()">+ New Session</button>
            </div>
            <div class="session-list" id="sessionList"></div>
        </div>
        <div class="chat">
            <div class="messages" id="messages">
                <div class="empty-state">
                    <h3>Raven Desktop</h3>
                    <p>Start a conversation or open a file</p>
                </div>
            </div>
            <div class="input-area">
                <textarea class="input-box" id="input" placeholder="Ask anything..."
                          onkeydown="handleKeyDown(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
            <div class="status-bar">
                <span id="statusText">Ready</span>
                <span id="tokenText"></span>
            </div>
        </div>
    </div>

    <script>
        const { invoke } = window.__TAURI__;

        async function sendMessage() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            addMessage('user', text);
            setLoading(true);

            try {
                const result = await invoke('chat', { message: text });
                addMessage('assistant', result.content);
                document.getElementById('tokenText').textContent =
                    `${result.input_tokens} in / ${result.output_tokens} out`;
            } catch (e) {
                addMessage('assistant', `**Error:** ${e}`);
            }

            setLoading(false);
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function addMessage(role, content) {
            const msgs = document.getElementById('messages');
            if (msgs.querySelector('.empty-state')) msgs.innerHTML = '';

            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.innerHTML = formatContent(content);
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function formatContent(text) {
            let html = escapeHtml(text);
            html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setLoading(loading) {
            document.getElementById('sendBtn').disabled = loading;
            document.getElementById('statusText').textContent = loading ? 'Thinking...' : 'Ready';
        }

        function clearChat() {
            document.getElementById('messages').innerHTML =
                '<div class="empty-state"><h3>New Chat</h3></div>';
            document.getElementById('tokenText').textContent = '';
        }

        async function checkHealth() {
            try {
                const result = await invoke('check_health');
                document.getElementById('statusText').textContent =
                    `${result.status} v${result.version}`;
            } catch (e) {
                document.getElementById('statusText').textContent = 'Error: ' + e;
            }
        }

        function newSession() {
            clearChat();
            invoke('clear_session').catch(() => {});
        }

        // Health check on load
        checkHealth();
    </script>
</body>
</html>
